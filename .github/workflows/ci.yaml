name: medicsan-ai CI workflow

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  code-linting-formatting:
    name: "Code Linting & Quality Verification"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install project dependencies
        run: pip install -r requirements.txt

      - name: Run ruff (lint)
        run: ruff check --fix .

      - name: Run ruff (formatting check)
        run: ruff format --check .

      - name: Run pytest
        run: pytest -v

  test-matrix:
    name: "Multi-Environment Python Matrix Suite"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.9', '3.10', '3.11'] # Strictly fulfills Issue #83 parameters
    steps:
      - name: "Checkout Source Code Stack"
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip' # Automated caching added to accelerate runtime footprint

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run tests
        run: pytest -v