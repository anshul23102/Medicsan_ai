<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - MediScan AI</title>
  <link rel="stylesheet" href="/static/css/style.css" />
  <style>
    .auth-container { max-width: 400px; margin: 50px auto; padding: 20px; background: var(--cardBg); border-radius: 12px; border: 1px solid var(--borderLight); }
    .auth-title { text-align: center; margin-bottom: 20px; color: var(--textPrimary); }
    .auth-form input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid var(--borderLight); border-radius: 8px; background: var(--bgLight); color: var(--textPrimary); }
    .auth-form button { width: 100%; padding: 12px; background: var(--primaryBtn); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; }
    .auth-link { display: block; text-align: center; margin-top: 15px; color: var(--textSecondary); text-decoration: none; }
    .auth-link:hover { color: var(--primaryBtn); }
    .flash-messages { color: red; text-align: center; margin-bottom: 15px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="auth-container">
      <h2 class="auth-title">💊 MediScan AI Login</h2>
      
      {% with messages = get_flashed_messages() %}
        {% if messages %}
          <div class="flash-messages">
            {% for message in messages %}
              <p>{{ message }}</p>
            {% endfor %}
          </div>
        {% endif %}
      {% endwith %}

      <form class="auth-form" method="POST" action="/login">
        <input type="text" name="username" placeholder="Username" required />
        <input type="password" name="password" placeholder="Password" required />
        <button type="submit">Log In</button>
      </form>
      <a class="auth-link" href="/register">Don't have an account? Register</a>
    </div>
  </div>
</body>
</html>
